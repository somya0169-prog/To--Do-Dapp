<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo DApp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>🚀 To-Do DApp</h2>
        <button onclick="toggleDark()" class="btn btn-dark">🌙</button>
    </div>

    <div class="card p-3 mb-4 text-center login-card">
        <h5>🔐 Wallet Login</h5>
        <input id="wallet" class="form-control mb-2" placeholder="Enter wallet ID">
        <button onclick="login()" class="btn btn-primary">Connect</button>
        <p id="user" class="mt-2"></p>
    </div>

    <div class="row text-center mb-4">
        <div class="col-md-6">
            <div class="card p-3 dashboard-card">
                <h5>Total Tasks</h5>
                <h2>{{ total_tasks }}</h2>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3 dashboard-card">
                <h5>Latest Task</h5>
                <p>{{ latest_task }}</p>
            </div>
        </div>
    </div>

    <form action="/add" method="POST" class="d-flex gap-2 mb-4">
        <input type="text" name="task" class="form-control" placeholder="Enter task..." required>
        <button class="btn btn-success add-btn">Add</button>
    </form>

    {% for task in tasks %}
    <div class="card p-3 mb-3 task-card">
        <h5>{{ task.text }}</h5>
        <small>🕒 {{ task.time }}</small><br>
        <small>🔐 {{ task.hash[:20] }}...</small>

        <a href="/delete/{{ loop.index0 }}" class="btn btn-danger delete-btn mt-2">Delete</a>
    </div>
    {% else %}
    <div class="card p-3 mb-3 task-card">
        <p class="mb-0">No tasks yet</p>
    </div>
    {% endfor %}

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
